paths:
  raw_csv: Dataset.csv
  processed_dir: data/processed
  reports_dir: reports
  figures_dir: reports/figures
  tables_dir: reports/tables

input:
  encoding: cp1252
  date_format: "%m/%d/%Y"

analysis:
  currency: USD
  analysis_cutoff: max_order_date
  top_n_products: 10
  min_product_line_count_for_margin_ranking: 3
  high_discount_review_threshold: 0.30
  high_loss_line_rate_threshold: 0.30
  product_high_low_method: median_sales_with_minimum_line_count
  significant_state_sales_threshold: median

validation:
  tolerance: 0.01
  expected_rows: 2121
  expected_columns: 21
  expected_orders: 1764
  expected_customers: 707
